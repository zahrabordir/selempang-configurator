<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Custom Selempang Wisuda</title>

<style>

body{
font-family:Arial;
background:#f5f5f5;
margin:0;
}

.container{
max-width:1100px;
margin:auto;
padding:20px;
display:flex;
gap:30px;
flex-wrap:wrap;
}

.preview{
flex:1;
min-width:350px;
position:relative;
}

.preview img{
width:100%;
}

.layer{
position:absolute;
top:0;
left:0;
}

.controls{
flex:1;
min-width:320px;
}

.group{
margin-bottom:25px;
}

.group h3{
margin-bottom:10px;
}

.options{
display:flex;
gap:10px;
flex-wrap:wrap;
}

.options button{
padding:10px 15px;
border:none;
background:#ddd;
cursor:pointer;
}

.options button.active{
background:#007bff;
color:white;
}

.nama{
position:absolute;
top:160px;
right:80px;
color:white;
font-size:26px;
font-weight:bold;
transform:rotate(90deg);
}

input{
width:100%;
padding:10px;
font-size:16px;
}

</style>
</head>

<body>

<div class="container">

<!-- PREVIEW -->
<div class="preview">

<img src="images/Model Gold 1.png">

<img id="warna" class="layer" src="images/Bahan Navy.png">

<img id="motif" class="layer" src="images/Motif Daun.png">

<div id="namaPreview" class="nama">Nama Anda</div>

</div>


<!-- CONTROL -->
<div class="controls">

<!-- MODEL -->
<div class="group">
<h3>Pilih Model</h3>

<div class="options">

<button onclick="changeModel('Model Gold 1.png',this)">1</button>
<button onclick="changeModel('Model Gold 2.png',this)">2</button>
<button onclick="changeModel('Model Gold 3.png',this)">3</button>
<button onclick="changeModel('Model Gold 4.png',this)">4</button>
<button onclick="changeModel('Model Gold 5.png',this)">5</button>
<button onclick="changeModel('Model Gold 6.png',this)">6</button>
<button onclick="changeModel('Model Gold 7.png',this)">7</button>
<button onclick="changeModel('Model Gold 8.png',this)">8</button>
<button onclick="changeModel('Model Gold 9.png',this)">9</button>

</div>
</div>


<!-- WARNA -->
<div class="group">
<h3>Warna Bahan</h3>

<div class="options">

<button onclick="changeColor('Bahan Hitam.png',this)">Hitam</button>
<button onclick="changeColor('Bahan Maroon.png',this)">Maroon</button>
<button onclick="changeColor('Bahan Navy.png',this)">Navy</button>

</div>
</div>


<!-- MOTIF -->
<div class="group">
<h3>Pilih Motif</h3>

<div class="options">

<button onclick="changeMotif('Motif Daun.png',this)">Daun</button>
<button onclick="changeMotif('Motif Flora.png',this)">Flora</button>
<button onclick="changeMotif('Motif Kait.png',this)">Kait</button>
<button onclick="changeMotif('Motif Klasik.png',this)">Klasik</button>

</div>
</div>


<!-- NAMA -->
<div class="group">

<h3>Nama di Selempang</h3>

<input type="text" placeholder="Tulis nama..." onkeyup="updateNama(this.value)">

</div>

</div>

</div>

<script>

function changeModel(img){

document.querySelector(".preview img").src="images/"+img;

}

function changeColor(img){

document.getElementById("warna").src="images/"+img;

}

function changeMotif(img){

document.getElementById("motif").src="images/"+img;

}

function updateNama(nama){

document.getElementById("namaPreview").innerText=nama;

}

</script>

</body>
</html>
