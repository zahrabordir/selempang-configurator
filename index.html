<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Custom Selempang Wisuda</title>

<style>
*{box-sizing:border-box;}

body{
font-family:Arial;
margin:0;
background:#f2f2f2;
}

.container{
max-width:1200px;
margin:auto;
padding:30px;
display:flex;
flex-wrap:wrap;
gap:30px;
}

.previewBox{
flex:1;
min-width:320px;
}

.preview{
position:relative;
aspect-ratio:1/1;
border:1px solid #ccc;
background:#fff;
}

.preview img{
position:absolute;
top:0;left:0;
width:100%;height:100%;
object-fit:contain;
}

#warna{z-index:1}
#model{z-index:2}
#motif{z-index:3}

.controls,.textInput{
flex:1;
min-width:280px;
}

button{
padding:8px 12px;
border:none;
background:#ddd;
cursor:pointer;
border-radius:5px;
margin:3px;
}

button:hover{background:#bbb;}

#submitBtn{
width:100%;
background:#4CAF50;
color:#fff;
padding:12px;
margin-top:10px;
}

.grid{
display:flex;
flex-wrap:wrap;
gap:10px;
}

.thumb{
text-align:center;
cursor:pointer;
}

.thumb img{
width:60px;
height:60px;
border:1px solid #ccc;
border-radius:5px;
}

#overlay{
display:none;
position:fixed;
top:0;left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.95);
justify-content:center;
align-items:center;
flex-direction:column;
}

#fullCanvas{
background:#fff;
max-width:90vw;
max-height:90vh;
}

.actionButtons{
position:fixed;
bottom:30px;
display:flex;
gap:10px;
}

.actionButtons button{
background:#fff;
}
</style>
</head>

<body>

<div class="container">

<!-- PREVIEW -->
<div class="previewBox">
<div class="preview">
<img id="warna">
<img id="model">
<img id="motif">
</div>
</div>

<!-- CONTROL -->
<div class="controls">

<h3>Bahan</h3>
<button onclick="setWarna('Hitam')">Hitam</button>
<button onclick="setWarna('Maroon')">Maroon</button>
<button onclick="setWarna('Navy')">Navy</button>

<h3>Warna Bordir</h3>
<button onclick="setBordir('Gold')">Gold</button>
<button onclick="setBordir('Silver')">Silver</button>

<h3>Model</h3>
<div id="modelOptions"></div>

<h3>Motif</h3>
<div class="grid" id="motifList"></div>

</div>

<!-- INPUT -->
<div class="textInput">
<h3>Data Isian</h3>
<input id="namaGelar" placeholder="Nama">
<input id="kampus" placeholder="Kampus">
<input id="jurusan" placeholder="Jurusan">
<input id="classof" placeholder="Class Of">

<button id="submitBtn" onclick="submitSelection()">Lihat Hasil</button>
</div>

</div>

<!-- OVERLAY -->
<div id="overlay">
<canvas id="fullCanvas"></canvas>

<div class="actionButtons">
<button onclick="downloadJPG()">Download</button>
<button onclick="closeOverlay()">Close</button>
</div>
</div>

<script>

let model="1"
let bordir="Gold"
let motif="Motif_Kait"

const models=["1","2","3","4","5","6","7","8","9","PPG_1","PPG_2","PPG_3"]

const motifs=[
"Motif_Daun",
"Motif_Flora",
"Motif_Kait",
"Motif_Klasik",
"Motif_Polos",
"Motif_Serat",
"Motif_Simpul"
]

function loadModels(){
const c=document.getElementById("modelOptions")
models.forEach(m=>{
let b=document.createElement("button")
b.innerText=m
b.onclick=()=>setModel(m)
c.appendChild(b)
})
}

function loadMotifs(){
const c=document.getElementById("motifList")
motifs.forEach(m=>{
let div=document.createElement("div")
div.className="thumb"
div.onclick=()=>setMotif(m)

div.innerHTML=`
<img src="images/Thumb/${m}_thumb.png">
<br>${m.replace("Motif_","")}
`

c.appendChild(div)
})
}

function setWarna(w){
document.getElementById("warna").src="images/Bahan/Bahan_"+w+".png"
}

function setBordir(b){
bordir=b
setModel(model)
setMotif(motif)
}

function setModel(n){
model=n
let file=n.startsWith("PPG_") ? n+"_"+bordir+".png" : "Model_"+n+"_"+bordir+".png"
document.getElementById("model").src="images/Model/"+file
}

function setMotif(m){
motif=m
if(m==="Motif_Polos"){
document.getElementById("motif").src="images/Motif/Motif_Polos.png"
}else{
document.getElementById("motif").src="images/Motif/"+m+"_"+bordir+".png"
}
}

function loadImage(src){
return new Promise(res=>{
let img=new Image()
img.onload=()=>res(img)
img.src=src
})
}

async function submitSelection(){

const canvas=document.getElementById("fullCanvas")
const ctx=canvas.getContext("2d")

const warnaEl=document.getElementById("warna")
const modelEl=document.getElementById("model")
const motifEl=document.getElementById("motif")

if(!warnaEl.src || !modelEl.src || !motifEl.src){
alert("Lengkapi pilihan dulu")
return
}

document.getElementById("overlay").style.display="flex"

const imgWarna=await loadImage(warnaEl.src)
const imgModel=await loadImage(modelEl.src)
const imgMotif=await loadImage(motifEl.src)

canvas.width=imgModel.width*2
canvas.height=imgModel.height*2

// background putih
ctx.fillStyle="#ffffff"
ctx.fillRect(0,0,canvas.width,canvas.height)

// render gambar saja
ctx.drawImage(imgWarna,0,0,canvas.width,canvas.height)
ctx.drawImage(imgModel,0,0,canvas.width,canvas.height)
ctx.drawImage(imgMotif,0,0,canvas.width,canvas.height)

}

function closeOverlay(){
document.getElementById("overlay").style.display="none"
}

function downloadJPG(){
const canvas=document.getElementById("fullCanvas")
const link=document.createElement("a")
link.download="hasil.jpg"
link.href=canvas.toDataURL("image/jpeg",0.95)
link.click()
}

/* INIT FIX */
document.addEventListener("DOMContentLoaded",function(){
loadModels()
loadMotifs()

setWarna("Navy")
setBordir("Gold")
setModel("1")
setMotif("Motif_Kait")
})

</script>

</body>
</html>
