<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Custom Selempang Wisuda</title>
<style>
body{
    font-family:Arial,sans-serif;
    background:#f2f2f2;
    margin:0;
    padding:0;
}
.container{
    max-width:1200px;
    margin:auto;
    padding:30px;
    display:flex;
    flex-wrap:wrap;
    gap:40px;
}
.preview{
    flex:1;
    min-width:300px;
    position:relative;
    aspect-ratio:1/1;
    border:1px solid #ccc;
    background:#fff;
}
.preview img{
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:100%;
    object-fit:contain;
}
#warna{ z-index:1; }
#model{ z-index:2; }
#motif{ z-index:3; }

.controls{
    flex:1;
    min-width:280px;
}
.group{
    margin-bottom:30px;
}
.group h3{
    margin-bottom:10px;
}
.options{
    display:flex;
    flex-wrap:wrap;
    gap:10px;
}
button{
    padding:8px 12px;
    border:none;
    background:#ddd;
    cursor:pointer;
    border-radius:5px;
    transition:0.2s;
}
button:hover{
    background:#bbb;
}
button:disabled{
    background:#f0f0f0;
    cursor:not-allowed;
}

/* THUMBNAIL GRID */
.grid{
    display:flex;
    flex-wrap:wrap;
    gap:10px;
}
.thumb{
    display:flex;
    flex-direction:column;
    align-items:center;
    cursor:pointer;
}
.thumb img{
    width:60px;
    height:60px;
    border-radius:6px;
    border:2px solid #ddd;
    object-fit:cover;
    transition:0.2s;
}
.thumb span{
    font-size:13px;
    margin-top:4px;
    text-align:center;
}
.thumb.active img{
    border-color:#444;
}

.tab{
    display:flex;
    gap:10px;
    margin-bottom:10px;
}
.tab button{
    flex:1;
}
#submitBtn{
    margin-top:20px;
    background:#4CAF50;
    color:#fff;
}
#submitBtn:hover{
    background:#45a049;
}

/* FULL SCREEN OVERLAY */
#overlay{
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100vw;
    height:100vh;
    background:rgba(0,0,0,0.9);
    z-index:9999;
    justify-content:center;
    align-items:center;
    flex-direction:column;
}
#fullCanvas{
    background:#fff;
}
#overlay span{
    color:#fff;
    margin-bottom:10px;
}
#closeOverlay{
    margin-top:20px;
    padding:8px 14px;
    cursor:pointer;
    border:none;
    border-radius:5px;
    background:#fff;
}
@media(max-width:768px){
    .container{
        flex-direction:column;
        gap:20px;
    }
}
</style>
</head>
<body>

<div class="container">

    <div class="preview">
        <img id="warna" src="">
        <img id="model" src="">
        <img id="motif" src="">
    </div>

    <div class="controls">

        <!-- BAHAN -->
        <div class="group">
            <h3>Pilih Bahan</h3>
            <div class="options">
                <button id="btnHitam" onclick="setWarna('Hitam')">Hitam</button>
                <button id="btnMaroon" onclick="setWarna('Maroon')">Maroon</button>
                <button id="btnNavy" onclick="setWarna('Navy')">Navy</button>
            </div>
        </div>

        <!-- WARNA BORDIR -->
        <div class="group">
            <h3>Warna Bordir</h3>
            <div class="tab">
                <button id="btnGold" onclick="setBordir('Gold')" disabled>Gold</button>
                <button id="btnSilver" onclick="setBordir('Silver')" disabled>Silver</button>
            </div>
        </div>

        <!-- MODEL -->
        <div class="group">
            <h3>Pilih Model</h3>
            <div class="grid" id="modelOptions"></div>
        </div>

        <!-- MOTIF -->
        <div class="group">
            <h3>Pilih Motif</h3>
            <div class="grid" id="motifList"></div>
        </div>

        <!-- SUBMIT -->
        <button id="submitBtn" onclick="submitSelection()">Lihat Hasil</button>

    </div>

</div>

<!-- FULL SCREEN OVERLAY -->
<div id="overlay">
    <span>Loading preview...</span>
    <canvas id="fullCanvas"></canvas>
    <button id="closeOverlay" onclick="closeOverlay()">Close</button>
</div>

<script>
// STATE
let model = "";
let bordir = "";
let motif = "Motif_Kait";
let bahanSelected = false;
let bordirSelected = false;

// DATA
const modelImages = [
    "Model_1_Gold.png",
    "Model_2_Gold.png",
    "Model_3_Gold.png",
    "Model_4_Gold.png",
    "Model_5_Gold.png",
    "Model_6_Gold.png",
    "Model_7_Gold.png",
    "Model_8_Gold.png",
    "Model_9_Gold.png",
    "PPG_1_Silver.png",
    "PPG_2_Silver.png",
    "PPG_3_Silver.png",
    "PPG_1_Gold.png",
    "PPG_2_Gold.png"
];

const motifs = [
    "Motif_Daun",
    "Motif_Flora",
    "Motif_Kait",
    "Motif_Klasik",
    "Motif_Polos",
    "Motif_Serat",
    "Motif_Simpul"
];

// LOAD MODEL THUMBNAILS
function loadModels(){
    const container = document.getElementById("modelOptions");
    container.innerHTML = "";
    modelImages.forEach(imgName => {
        const div = document.createElement("div");
        div.className = "thumb";
        div.onclick = ()=> setModelImage(imgName);
        div.innerHTML = `<img loading="lazy" src="images/Model/${imgName}"><span>${imgName.replace(".png","")}</span>`;
        container.appendChild(div);
        div.style.pointerEvents = bordirSelected ? "auto" : "none"; // aktifkan kalau bordir sudah dipilih
    });
}

// LOAD MOTIF THUMBNAIL
function loadMotifs(){
    const container = document.getElementById("motifList");
    container.innerHTML = "";
    motifs.forEach(m=>{
        let name = m.replace("Motif_","");
        const div = document.createElement("div");
        div.className = "thumb";
        div.onclick = ()=> setMotif(m);
        div.innerHTML = `<img loading="lazy" src="images/Thumb/${m}_thumb.png"><span>${name}</span>`;
        container.appendChild(div);
        div.style.pointerEvents = "none";
    });
}

// SET FUNCTIONS
function setWarna(w){
    document.getElementById("warna").src = "images/Bahan/Bahan_" + w + ".png";
    bahanSelected = true;
    enableBordir();
}
function enableBordir(){
    if(bahanSelected){
        document.getElementById("btnGold").disabled = false;
        document.getElementById("btnSilver").disabled = false;
    }
}
function setBordir(b){
    bordir = b;
    bordirSelected = true;
    updateModel();
    updateMotif();
    enableModel();
}
function enableModel(){
    if(bordirSelected){
        document.querySelectorAll("#modelOptions .thumb").forEach(div=> div.style.pointerEvents = "auto");
    }
}
function setModelImage(imgName){
    model = imgName;
    document.getElementById("model").src = "images/Model/" + imgName;
    document.querySelectorAll("#modelOptions .thumb").forEach(t=>t.classList.remove("active"));
    const thumb = document.querySelector(`#modelOptions img[src*='${imgName}']`);
    if(thumb) thumb.parentElement.classList.add("active");
    enableMotif();
}
function enableMotif(){
    document.querySelectorAll(".thumb").forEach(t=>t.style.pointerEvents = "auto");
}
function setMotif(m){
    if(!bordirSelected) return;
    motif = m;
    if(motif === "Motif_Polos"){
        document.getElementById("motif").src = "images/Motif/Motif_Polos.png";
    } else {
        document.getElementById("motif").src = "images/Motif/" + motif + "_" + bordir + ".png";
    }
    document.querySelectorAll("#motifList .thumb").forEach(t=>t.classList.remove("active"));
    const thumb = document.querySelector(`#motifList img[src*='${m}_thumb.png']`);
    if(thumb) thumb.parentElement.classList.add("active");
}

// SUBMIT FULL SCREEN CANVAS PROPORSIONAL
function submitSelection(){
    const overlay = document.getElementById("overlay");
    const canvas = document.getElementById("fullCanvas");
    const ctx = canvas.getContext("2d");

    overlay.style.display = "flex";
    overlay.querySelector("span").style.display = "block";

    const imgWarna = new Image();
    const imgModel = new Image();
    const imgMotif = new Image();

    imgWarna.crossOrigin = "anonymous";
    imgModel.crossOrigin = "anonymous";
    imgMotif.crossOrigin = "anonymous";

    imgWarna.src = document.getElementById("warna").src;
    imgModel.src = document.getElementById("model").src;
    imgMotif.src = document.getElementById("motif").src;

    let loaded = 0;
    [imgWarna,imgModel,imgMotif].forEach(img=>{
        img.onload = ()=>{
            loaded++;
            if(loaded === 3){
                const screenRatio = window.innerWidth / window.innerHeight;
                const imgRatio = imgModel.width / imgModel.height;
                let drawWidth, drawHeight;
                if(imgRatio > screenRatio){
                    drawWidth = window.innerWidth * 0.9;
                    drawHeight = drawWidth / imgRatio;
                } else {
                    drawHeight = window.innerHeight * 0.9;
                    drawWidth = drawHeight * imgRatio;
                }
                canvas.width = drawWidth;
                canvas.height = drawHeight;
                ctx.clearRect(0,0,canvas.width,canvas.height);
                ctx.drawImage(imgWarna,0,0,canvas.width,canvas.height);
                ctx.drawImage(imgModel,0,0,canvas.width,canvas.height);
                ctx.drawImage(imgMotif,0,0,canvas.width,canvas.height);
                overlay.querySelector("span").style.display = "none";
                canvas.style.display = "block";
            }
        };
    });
}
function closeOverlay(){
    document.getElementById("overlay").style.display = "none";
    document.getElementById("fullCanvas").style.display = "none";
}

// INIT
loadModels();
loadMotifs();
setWarna("Navy");
</script>

</body>
</html>
