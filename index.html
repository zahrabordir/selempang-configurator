<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Custom Selempang Wisuda</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f4f4f4;
}

.container{
max-width:1200px;
margin:auto;
padding:30px;
display:flex;
gap:40px;
flex-wrap:wrap;
}

.preview{
flex:1;
min-width:350px;
position:relative;
}

.preview img{
width:100%;
}

.layer{
position:absolute;
top:0;
left:0;
}

.controls{
flex:1;
min-width:320px;
}

.group{
margin-bottom:30px;
}

.options{
display:flex;
flex-wrap:wrap;
gap:10px;
}

button{
padding:10px 14px;
border:none;
background:#ddd;
cursor:pointer;
border-radius:6px;
font-size:14px;
}

button:hover{
background:#bbb;
}

/* THUMBNAIL MOTIF */

.thumbs{
display:flex;
flex-wrap:wrap;
gap:10px;
}

.thumb{
width:70px;
height:70px;
object-fit:cover;
border:2px solid transparent;
border-radius:6px;
cursor:pointer;
transition:0.2s;
}

.thumb:hover{
border:2px solid #888;
}

.thumb.active{
border:2px solid red;
}

</style>

</head>

<body>

<div class="container">

<!-- PREVIEW -->

<div class="preview">

<img id="model" src="images/Model_1_Gold.png">

<img id="warna" class="layer" src="images/Bahan_Navy.png">

<img id="motif" class="layer" src="images/Motif_Polos.png">

</div>



<div class="controls">

<!-- MODEL -->

<div class="group">

<h3>Pilih Model</h3>

<div class="options">

<button onclick="pilihModel(1)">1</button>
<button onclick="pilihModel(2)">2</button>
<button onclick="pilihModel(3)">3</button>
<button onclick="pilihModel(4)">4</button>
<button onclick="pilihModel(5)">5</button>
<button onclick="pilihModel(6)">6</button>
<button onclick="pilihModel(7)">7</button>
<button onclick="pilihModel(8)">8</button>
<button onclick="pilihModel(9)">9</button>

</div>

</div>



<!-- WARNA BAHAN -->

<div class="group">

<h3>Warna Bahan</h3>

<div class="options">

<button onclick="pilihBahan('Hitam')">Hitam</button>
<button onclick="pilihBahan('Maroon')">Maroon</button>
<button onclick="pilihBahan('Navy')">Navy</button>

</div>

</div>



<!-- MOTIF -->

<div class="group">

<h3>Pilih Motif</h3>

<div class="thumbs">

<img src="images/Motif_Daun_thumb.png" onclick="pilihMotif(event,'Daun')" class="thumb">

<img src="images/Motif_Flora_thumb.png" onclick="pilihMotif(event,'Flora')" class="thumb">

<img src="images/Motif_Kait_thumb.png" onclick="pilihMotif(event,'Kait')" class="thumb">

<img src="images/Motif_Klasik_thumb.png" onclick="pilihMotif(event,'Klasik')" class="thumb">

<img src="images/Motif_Serat_thumb.png" onclick="pilihMotif(event,'Serat')" class="thumb">

<img src="images/Motif_Simpul_thumb.png" onclick="pilihMotif(event,'Simpul')" class="thumb">

<img src="images/Motif_Polos_thumb.png" onclick="pilihMotif(event,'Polos')" class="thumb">

</div>

</div>



<!-- WARNA BORDIR -->

<div class="group">

<h3>Warna Bordir</h3>

<div class="options">

<button onclick="pilihWarna('Gold')">Gold</button>
<button onclick="pilihWarna('Silver')">Silver</button>

</div>

</div>


</div>

</div>



<script>

let modelNow = 1
let bahanNow = "Navy"
let motifNow = "Polos"
let bordirNow = "Gold"



function pilihModel(n){

modelNow = n
updatePreview()

}



function pilihBahan(nama){

bahanNow = nama

document.getElementById("warna").src =
"images/Bahan_" + nama + ".png"

}



function pilihMotif(event,nama){

motifNow = nama

document.getElementById("motif").src =
"images/Motif_" + nama + "_" + bordirNow + ".png"


document.querySelectorAll(".thumb").forEach(img=>{
img.classList.remove("active")
})

event.target.classList.add("active")

}



function pilihWarna(nama){

bordirNow = nama
updatePreview()

}



function updatePreview(){

document.getElementById("model").src =
"images/Model_" + modelNow + "_" + bordirNow + ".png"


document.getElementById("motif").src =
"images/Motif_" + motifNow + "_" + bordirNow + ".png"

}

</script>

</body>
</html>
