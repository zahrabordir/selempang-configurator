<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Custom Selempang Wisuda</title>

<style>
*{box-sizing:border-box;}

body{
font-family:Arial;
margin:0;
background:#f2f2f2;
}

.container{
max-width:1200px;
margin:auto;
padding:30px;
display:flex;
flex-wrap:wrap;
gap:30px;
}

/* PREVIEW */
.preview{
position:relative;
aspect-ratio:1/1;
background:#fff;
border:1px solid #ccc;
flex:1;
min-width:300px;
}

.preview img{
position:absolute;
top:0;left:0;
width:100%;height:100%;
object-fit:contain;
}

#warna{z-index:1}
#model{z-index:2}
#motif{z-index:3}

/* CONTROL */
.controls,.textInput{
flex:1;
min-width:280px;
}

button{
padding:8px 12px;
border:none;
background:#ddd;
cursor:pointer;
border-radius:5px;
margin:3px;
}

button:hover{background:#bbb;}

#submitBtn{
width:100%;
background:#4CAF50;
color:#fff;
padding:12px;
margin-top:10px;
}

/* GRID MOTIF */
.grid{
display:flex;
flex-wrap:wrap;
gap:10px;
}

.thumb{
text-align:center;
cursor:pointer;
}

.thumb img{
width:60px;
height:60px;
border:1px solid #ccc;
border-radius:5px;
}

/* OVERLAY */
#overlay{
display:none;
position:fixed;
top:0;left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.95);
justify-content:center;
align-items:center;
flex-direction:column;
}

#fullCanvas{
background:#fff;
max-width:90vw;
max-height:90vh;
}

#closeOverlay{
position:fixed;
top:20px;
right:20px;
background:#fff;
padding:10px;
cursor:pointer;
}

.actionButtons{
position:fixed;
bottom:30px;
display:flex;
gap:10px;
}

.actionButtons button{
background:#fff;
}
</style>
</head>

<body>

<div class="container">

<!-- PREVIEW -->
<div class="preview">
<img id="warna">
<img id="model">
<img id="motif">
</div>

<!-- CONTROL -->
<div class="controls">
<h3>Bahan</h3>
<button onclick="setWarna('Hitam')">Hitam</button>
<button onclick="setWarna('Maroon')">Maroon</button>
<button onclick="setWarna('Navy')">Navy</button>

<h3>Warna Bordir</h3>
<button onclick="setBordir('Gold')">Gold</button>
<button onclick="setBordir('Silver')">Silver</button>

<h3>Model</h3>
<div id="modelOptions"></div>

<h3>Motif</h3>
<div class="grid" id="motifList"></div>
</div>

<!-- INPUT -->
<div class="textInput">
<h3>Data (untuk WA)</h3>
<input id="namaGelar" placeholder="Nama">
<input id="kampus" placeholder="Kampus">
<input id="jurusan" placeholder="Jurusan">
<input id="classof" placeholder="Class">
<button id="submitBtn" onclick="submitSelection()">Lihat Hasil</button>
</div>

</div>

<!-- OVERLAY -->
<div id="overlay">

<button id="closeOverlay" onclick="closeOverlay()">Close</button>

<canvas id="fullCanvas"></canvas>

<div class="actionButtons">
<button onclick="downloadJPG()">Unduh</button>
<button onclick="sendWhatsApp()">Kirim WhatsApp</button>
</div>

</div>

<script>

let model="1"
let bordir="Gold"
let motif="Motif_Kait"

const models=["1","2","3","4","5","6","7","8","9","PPG_1","PPG_2","PPG_3"]

const motifs=[
"Motif_Daun","Motif_Flora","Motif_Kait",
"Motif_Klasik","Motif_Polos","Motif_Serat","Motif_Simpul"
]

function loadModels(){
let c=document.getElementById("modelOptions")
models.forEach(m=>{
let b=document.createElement("button")
b.innerText=m
b.onclick=()=>setModel(m)
c.appendChild(b)
})
}

function loadMotifs(){
let c=document.getElementById("motifList")
motifs.forEach(m=>{
let div=document.createElement("div")
div.className="thumb"
div.onclick=()=>setMotif(m)

div.innerHTML=`
<img src="images/Thumb/${m}_thumb.png">
<br>${m.replace("Motif_","")}
`
c.appendChild(div)
})
}

function setWarna(w){
warna.src="images/Bahan/Bahan_"+w+".png"
}

function setBordir(b){
bordir=b
setModel(model)
setMotif(motif)
}

function setModel(n){
model=n
let file=n.startsWith("PPG_") ? n+"_"+bordir+".png" : "Model_"+n+"_"+bordir+".png"
modelEl=document.getElementById("model")
modelEl.src="images/Model/"+file
}

function setMotif(m){
motif=m
if(m==="Motif_Polos"){
motifEl.src="images/Motif/Motif_Polos.png"
}else{
motifEl.src="images/Motif/"+m+"_"+bordir+".png"
}
}

function loadImage(src){
return new Promise(res=>{
let img=new Image()
img.onload=()=>res(img)
img.src=src
})
}

async function submitSelection(){

const overlay=document.getElementById("overlay")
const canvas=document.getElementById("fullCanvas")
const ctx=canvas.getContext("2d")

const warnaEl=document.getElementById("warna")
const modelEl=document.getElementById("model")
const motifEl=document.getElementById("motif")

if(!warnaEl.src || !modelEl.src || !motifEl.src){
alert("Lengkapi pilihan dulu")
return
}

// load dulu
const imgWarna=await loadImage(warnaEl.src)
const imgModel=await loadImage(modelEl.src)
const imgMotif=await loadImage(motifEl.src)

// canvas
canvas.width=imgModel.width*2
canvas.height=imgModel.height*2

// background putih
ctx.fillStyle="#fff"
ctx.fillRect(0,0,canvas.width,canvas.height)

// gambar
ctx.drawImage(imgWarna,0,0,canvas.width,canvas.height)
ctx.drawImage(imgModel,0,0,canvas.width,canvas.height)
ctx.drawImage(imgMotif,0,0,canvas.width,canvas.height)

// tampilkan setelah selesai
overlay.style.display="flex"

}

function closeOverlay(){
overlay.style.display="none"
}

function downloadJPG(){
let link=document.createElement("a")
link.href=fullCanvas.toDataURL("image/jpeg",0.95)
link.download="hasil.jpg"
link.click()
}

function sendWhatsApp(){

let kampus=kampusInput.value
let jurusan=jurusanInput.value
let classof=classofInput.value
let nama=namaGelar.value

let bahan=warna.src.split("Bahan_")[1].replace(".png","")

let pesan=`Halo Kak, saya mau pesan selempang:

Motif: ${motif}
Model: ${model}
Warna Kain: ${bahan}
Warna Bordir: ${bordir}

Nama: ${nama}
Kampus: ${kampus}
Jurusan: ${jurusan}
Class: ${classof}`

window.open(`https://wa.me/6281372490831?text=${encodeURIComponent(pesan)}`)
}

/* INIT */
document.addEventListener("DOMContentLoaded",()=>{
loadModels()
loadMotifs()

setWarna("Navy")
setBordir("Gold")
setModel("1")
setMotif("Motif_Kait")
})

</script>

</body>
</html>
