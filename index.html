<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Custom Selempang</title>

<style>

body{
font-family:Arial;
background:#f5f5f5;
margin:0;
}

.container{
max-width:1200px;
margin:auto;
padding:30px;
display:flex;
gap:40px;
flex-wrap:wrap;
}

.preview{
flex:1;
min-width:350px;
position:relative;
}

.preview img{
width:100%;
}

.layer{
position:absolute;
top:0;
left:0;
}

.controls{
flex:1;
min-width:320px;
}

.group{
margin-bottom:30px;
}

.options{
display:flex;
flex-wrap:wrap;
gap:10px;
}

button{
padding:10px 14px;
border:none;
background:#ddd;
cursor:pointer;
border-radius:4px;
}

button:hover{
background:#bbb;
}

</style>
</head>

<body>

<div class="container">

<!-- PREVIEW -->
<div class="preview">

<img id="model" src="images/Model_1_Gold.png">

<img id="warna" class="layer" src="images/Bahan_Navy.png">

<img id="motif" class="layer" src="images/Motif_Polos.png">

</div>


<div class="controls">

<!-- MODEL -->
<div class="group">

<h3>Pilih Model</h3>

<div class="options">

<button onclick="model(1)">1</button>
<button onclick="model(2)">2</button>
<button onclick="model(3)">3</button>
<button onclick="model(4)">4</button>
<button onclick="model(5)">5</button>
<button onclick="model(6)">6</button>
<button onclick="model(7)">7</button>
<button onclick="model(8)">8</button>
<button onclick="model(9)">9</button>

</div>

</div>


<!-- WARNA -->
<div class="group">

<h3>Warna Bahan</h3>

<div class="options">

<button onclick="warna('Hitam')">Hitam</button>
<button onclick="warna('Maroon')">Maroon</button>
<button onclick="warna('Navy')">Navy</button>

</div>

</div>


<!-- MOTIF -->
<div class="group">

<h3>Pilih Motif</h3>

<div class="options">

<button onclick="motif('Motif_Daun_Gold.png')">Daun Gold</button>
<button onclick="motif('Motif_Daun_Silver.png')">Daun Silver</button>

<button onclick="motif('Motif_Flora_Gold.png')">Flora Gold</button>
<button onclick="motif('Motif_Flora_Silver.png')">Flora Silver</button>

<button onclick="motif('Motif_Kait_Gold.png')">Kait Gold</button>
<button onclick="motif('Motif_Kait_Silver.png')">Kait Silver</button>

<button onclick="motif('Motif_Klasik_Gold.png')">Klasik Gold</button>
<button onclick="motif('Motif_Klasik_Silver.png')">Klasik Silver</button>

<button onclick="motif('Motif_Serat_Gold.png')">Serat Gold</button>
<button onclick="motif('Motif_Serat_Silver.png')">Serat Silver</button>

<button onclick="motif('Motif_Simpul_Gold.png')">Simpul Gold</button>
<button onclick="motif('Motif_Simpul_Silver.png')">Simpul Silver</button>

<button onclick="motif('Motif_Polos.png')">Polos</button>

</div>

</div>

</div>

</div>


<script>

let modelNow = 1
let warnaNow = "Navy"
let warnaTulisan = "Gold"


function model(n){

modelNow = n
updateModel()

}

function warna(w){

warnaNow = w

document.getElementById("warna").src =
"images/Bahan_" + w + ".png"

updateModel()

}

function motif(file){

document.getElementById("motif").src =
"images/" + file

if(file.includes("Silver")){
warnaTulisan = "Silver"
}else{
warnaTulisan = "Gold"
}

updateModel()

}

function updateModel(){

document.getElementById("model").src =
"images/Model_" + modelNow + "_" + warnaTulisan + ".png"

}

</script>

</body>
</html>
