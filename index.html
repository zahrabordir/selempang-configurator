<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Custom Selempang Wisuda</title>

<style>

body{
font-family:Arial;
background:#f2f2f2;
margin:0;
}

.container{
max-width:1200px;
margin:auto;
padding:30px;
display:flex;
gap:40px;
flex-wrap:wrap;
}

.preview{
flex:1;
min-width:350px;
position:relative;
}

.preview img{
width:100%;
}

.layer{
position:absolute;
top:0;
left:0;
}

.controls{
flex:1;
min-width:320px;
}

.group{
margin-bottom:30px;
}

.options{
display:flex;
flex-wrap:wrap;
gap:10px;
}

button{
padding:10px 14px;
border:none;
background:#ddd;
cursor:pointer;
border-radius:5px;
}

button:hover{
background:#bbb;
}

.grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:15px;
}

.thumb{
text-align:center;
cursor:pointer;
}

.thumb img{
width:100%;
border-radius:6px;
border:2px solid #ddd;
}

.thumb span{
display:block;
margin-top:5px;
font-size:13px;
}

.tab{
display:flex;
gap:10px;
margin-bottom:15px;
}

.tab button{
flex:1;
}

</style>
</head>

<body>

<div class="container">

<!-- PREVIEW -->
<div class="preview">

<img id="model" src="images/Model/Model_1_Gold.png">

<img id="warna" class="layer" src="images/Bahan/Bahan_Navy.png">

<img id="motif" class="layer" src="images/Motif/Motif_Kait_Gold.png">

</div>


<div class="controls">

<!-- MODEL -->
<div class="group">

<h3>Pilih Model</h3>

<div class="options">

<button onclick="setModel(1)">1</button>
<button onclick="setModel(2)">2</button>
<button onclick="setModel(3)">3</button>
<button onclick="setModel(4)">4</button>
<button onclick="setModel(5)">5</button>
<button onclick="setModel(6)">6</button>
<button onclick="setModel(7)">7</button>
<button onclick="setModel(8)">8</button>
<button onclick="setModel(9)">9</button>

</div>

</div>


<!-- WARNA BAHAN -->
<div class="group">

<h3>Warna Bahan</h3>

<div class="options">

<button onclick="setWarna('Hitam')">Hitam</button>
<button onclick="setWarna('Maroon')">Maroon</button>
<button onclick="setWarna('Navy')">Navy</button>

</div>

</div>


<!-- WARNA BORDIR -->
<div class="group">

<h3>Warna Bordir</h3>

<div class="tab">

<button onclick="setBordir('Gold')">Gold</button>
<button onclick="setBordir('Silver')">Silver</button>

</div>

</div>


<!-- MOTIF -->
<div class="group">

<h3>Pilih Motif</h3>

<div class="grid" id="motifList"></div>

</div>

</div>

</div>


<script>

let model=1
let bordir="Gold"
let motif="Motif_Kait"

const motifs=[
"Motif_Daun",
"Motif_Flora",
"Motif_Kait",
"Motif_Klasik",
"Motif_Polos",
"Motif_Serat",
"Motif_Simpul"
]

function setModel(n){

model=n
updateModel()

}

function setWarna(w){

document.getElementById("warna").src=
"images/Bahan/Bahan_"+w+".png"

}

function setBordir(b){

bordir=b

updateModel()
updateMotif()

}

function setMotif(m){

motif=m

updateMotif()

}

function updateModel(){

document.getElementById("model").src=
"images/Model/Model_"+model+"_"+bordir+".png"

}

function updateMotif(){

if(motif=="Motif_Polos"){

document.getElementById("motif").src=
"images/Motif/Motif_Polos.png"

}else{

document.getElementById("motif").src=
"images/Motif/"+motif+"_"+bordir+".png"

}

}

function loadMotif(){

let container=document.getElementById("motifList")

motifs.forEach(m=>{

let name=m.replace("Motif_","")

container.innerHTML+=`

<div class="thumb" onclick="setMotif('${m}')">

<img src="images/Thumb/${m}_thumb.png">

<span>${name}</span>

</div>

`

})

}

loadMotif()

</script>

</body>
</html>
