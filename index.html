<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Custom Selempang Wisuda</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
font-family:Arial;
margin:0;
background:#f2f2f2;
}

.container{
max-width:1100px;
margin:auto;
padding:20px;
background:white;
display:flex;
flex-wrap:wrap;
gap:20px;
}

.left{
flex:1;
min-width:300px;
}

.right{
flex:1;
min-width:300px;
text-align:center;
}

.preview{
position:relative;
width:100%;
max-width:400px;
margin:auto;
}

.preview img{
width:100%;
display:block;
}

.thumb{
display:flex;
flex-wrap:wrap;
gap:10px;
margin-top:10px;
}

.thumb img{
width:70px;
cursor:pointer;
border:2px solid transparent;
}

.thumb img:hover{
border:2px solid #000;
}

input,select{
width:100%;
padding:10px;
margin-top:10px;
}

button{
padding:12px;
margin-top:10px;
cursor:pointer;
border:none;
background:#333;
color:white;
width:100%;
}

button:hover{
background:#555;
}

</style>
</head>

<body>

<div class="container">

<div class="left">

<h3>Pilih Bahan</h3>

<div class="thumb" id="bahanList"></div>

<h3>Pilih Model</h3>

<div class="thumb" id="modelList"></div>

<input type="text" id="nama" placeholder="Nama">
<input type="text" id="gelar" placeholder="Gelar">

<button onclick="downloadJPG()">Download JPG</button>

<button onclick="kirimWA()">Kirim ke WhatsApp</button>

</div>

<div class="right">

<div class="preview">

<img id="bahanPreview" src="images/Bahan/Bahan_Navy.png">
<img id="modelPreview" src="images/Model/Model_1_Gold.png" style="position:absolute;top:0;left:0">

</div>

</div>

</div>

<script>

const bahan = [
"images/Bahan/Bahan_Navy.png",
"images/Bahan/Bahan_Hitam.png",
"images/Bahan/Bahan_Maroon.png"
]

const model = [
"images/Model/Model_1_Gold.png",
"images/Model/Model_1_Silver.png",
"images/Model/Model_2_Silver.png",
"images/Model/Model_9.png"
]

let bahanDipilih = bahan[0]
let modelDipilih = model[0]

const bahanList = document.getElementById("bahanList")
const modelList = document.getElementById("modelList")

bahan.forEach(src=>{
let img=document.createElement("img")
img.src=src
img.onclick=()=>{
bahanDipilih=src
document.getElementById("bahanPreview").src=src
}
bahanList.appendChild(img)
})

model.forEach(src=>{
let img=document.createElement("img")
img.src=src
img.onclick=()=>{
modelDipilih=src
document.getElementById("modelPreview").src=src
}
modelList.appendChild(img)
})

function downloadJPG(){

const canvas=document.createElement("canvas")
const ctx=canvas.getContext("2d")

const img1=new Image()
const img2=new Image()

img1.src=bahanDipilih
img2.src=modelDipilih

img1.onload=()=>{
canvas.width=img1.width
canvas.height=img1.height

ctx.drawImage(img1,0,0)

img2.onload=()=>{
ctx.drawImage(img2,0,0)

const link=document.createElement("a")
link.download="selempang.jpg"
link.href=canvas.toDataURL("image/jpeg")
link.click()

}

}

}

function kirimWA(){

let nama=document.getElementById("nama").value
let gelar=document.getElementById("gelar").value

let pesan=
"Pesan Selempang Wisuda%0A%0A"+
"Nama : "+nama+"%0A"+
"Gelar : "+gelar+"%0A"

let url="https://wa.me/6280000000000?text="+pesan

window.open(url)

}

</script>

</body>
</html>
