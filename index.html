<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Custom Selempang Wisuda</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f2f2f2;
}

.container{
max-width:1200px;
margin:auto;
padding:30px;
display:flex;
flex-wrap:wrap;
gap:40px;
}

.preview{
flex:1;
min-width:300px;
position:relative;
aspect-ratio:1/1;
border:1px solid #ccc;
background:#fff;
}

.preview img{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
object-fit:contain;
}

#warna{z-index:1}
#model{z-index:2}
#motif{z-index:3}

.controls{
flex:1;
min-width:280px;
}

.group{
margin-bottom:25px;
}

.options{
display:flex;
flex-wrap:wrap;
gap:10px;
}

button{
padding:8px 12px;
border:none;
background:#ddd;
cursor:pointer;
border-radius:5px;
}

button:hover{
background:#bbb;
}

.grid{
display:flex;
flex-wrap:wrap;
gap:10px;
}

.thumb{
display:flex;
flex-direction:column;
align-items:center;
cursor:pointer;
}

.thumb img{
width:60px;
height:60px;
border:2px solid #ddd;
border-radius:6px;
object-fit:cover;
}

.thumb.active img{
border-color:#000;
}

#submitBtn{
margin-top:20px;
background:#4CAF50;
color:#fff;
}

/* OVERLAY */

#overlay{
display:none;
position:fixed;
top:0;
left:0;
width:100vw;
height:100vh;
background:rgba(0,0,0,0.95);
z-index:9999;
justify-content:center;
align-items:center;
flex-direction:column;
}

#fullCanvas{
max-width:90vw;
max-height:90vh;
background:#fff;
}

#closeOverlay{
position:fixed;
top:20px;
right:20px;
background:#fff;
padding:10px 15px;
border-radius:6px;
cursor:pointer;
z-index:10000;
}

.actionButtons{
position:fixed;
bottom:30px;
display:flex;
gap:10px;
}

.actionButtons button{
background:#fff;
}

</style>
</head>

<body>

<div class="container">

<div class="preview">
<img id="warna">
<img id="model">
<img id="motif">
</div>

<div class="controls">

<div class="group">
<h3>Bahan</h3>
<div class="options">
<button onclick="setWarna('Hitam')">Hitam</button>
<button onclick="setWarna('Maroon')">Maroon</button>
<button onclick="setWarna('Navy')">Navy</button>
</div>
</div>

<div class="group">
<h3>Warna Bordir</h3>
<div class="options">
<button onclick="setBordir('Gold')">Gold</button>
<button onclick="setBordir('Silver')">Silver</button>
</div>
</div>

<div class="group">
<h3>Model</h3>
<div class="options" id="modelOptions"></div>
</div>

<div class="group">
<h3>Motif</h3>
<div class="grid" id="motifList"></div>
</div>

<button id="submitBtn" onclick="submitSelection()">Lihat Hasil</button>

</div>
</div>


<div id="overlay">

<button id="closeOverlay" onclick="closeOverlay()">Close</button>

<canvas id="fullCanvas"></canvas>

<div class="actionButtons">
<button onclick="downloadJPG()">Unduh Gambar</button>
<button onclick="sendWhatsApp()">Kirim WhatsApp</button>
</div>

</div>

<script>

let model="1"
let bordir="Gold"
let motif="Motif_Kait"

const models=["1","2","3","4","5","6","7","8","9","PPG_1","PPG_2","PPG_3"]

const motifs=[
"Motif_Daun",
"Motif_Flora",
"Motif_Kait",
"Motif_Klasik",
"Motif_Polos",
"Motif_Serat",
"Motif_Simpul"
]

function loadModels(){

const container=document.getElementById("modelOptions")

models.forEach(m=>{

let btn=document.createElement("button")
btn.innerText=m
btn.onclick=()=>setModel(m)

container.appendChild(btn)

})

}

function loadMotifs(){

const container=document.getElementById("motifList")

motifs.forEach(m=>{

let name=m.replace("Motif_","")

let div=document.createElement("div")
div.className="thumb"

div.onclick=()=>setMotif(m)

div.innerHTML=
`<img src="images/Thumb/${m}_thumb.png">
<span>${name}</span>`

container.appendChild(div)

})

}

function setWarna(w){

document.getElementById("warna").src=
"images/Bahan/Bahan_"+w+".png"

}

function setBordir(b){

bordir=b
setModel(model)
setMotif(motif)

}

function setModel(n){

model=n

let file=n.startsWith("PPG_")
? n+"_"+bordir+".png"
: "Model_"+n+"_"+bordir+".png"

document.getElementById("model").src=
"images/Model/"+file

}

function setMotif(m){

motif=m

if(m==="Motif_Polos"){

document.getElementById("motif").src=
"images/Motif/Motif_Polos.png"

}else{

document.getElementById("motif").src=
"images/Motif/"+m+"_"+bordir+".png"

}

}

/* PREVIEW */

let canvasScale=1
let offsetX=0
let offsetY=0
let isDragging=false
let startX=0
let startY=0

function submitSelection(){

const overlay=document.getElementById("overlay")
const canvas=document.getElementById("fullCanvas")
const ctx=canvas.getContext("2d")

overlay.style.display="flex"

const imgWarna=new Image()
const imgModel=new Image()
const imgMotif=new Image()

imgWarna.src=document.getElementById("warna").src
imgModel.src=document.getElementById("model").src
imgMotif.src=document.getElementById("motif").src

let loaded=0

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height)

ctx.save()

ctx.translate(canvas.width/2+offsetX,canvas.height/2+offsetY)
ctx.scale(canvasScale,canvasScale)
ctx.translate(-canvas.width/2,-canvas.height/2)

ctx.drawImage(imgWarna,0,0,canvas.width,canvas.height)
ctx.drawImage(imgModel,0,0,canvas.width,canvas.height)
ctx.drawImage(imgMotif,0,0,canvas.width,canvas.height)

ctx.restore()

}

[imgWarna,imgModel,imgMotif].forEach(img=>{

img.onload=()=>{

loaded++

if(loaded===3){

canvas.width=imgModel.width*2
canvas.height=imgModel.height*2

draw()

canvas.onwheel=e=>{

e.preventDefault()

canvasScale+=e.deltaY>0?-0.1:0.1

if(canvasScale<0.2)canvasScale=0.2
if(canvasScale>6)canvasScale=6

draw()

}

canvas.onmousedown=e=>{

isDragging=true

startX=e.clientX-offsetX
startY=e.clientY-offsetY

}

canvas.onmousemove=e=>{

if(!isDragging)return

offsetX=e.clientX-startX
offsetY=e.clientY-startY

draw()

}

canvas.onmouseup=()=>isDragging=false
canvas.onmouseleave=()=>isDragging=false

canvas.ondblclick=()=>{

canvasScale=1
offsetX=0
offsetY=0

draw()

}

}

}

})

}

function closeOverlay(){

document.getElementById("overlay").style.display="none"

}

function downloadJPG(){

const canvas=document.getElementById("fullCanvas")

const link=document.createElement("a")

link.download="selempang-custom.jpg"

link.href=canvas.toDataURL("image/jpeg",0.95)

link.click()

}

function sendWhatsApp(){

let bahan=document.getElementById("warna").src.split("Bahan_")[1].replace(".png","")

let pesan=
`Halo saya ingin memesan selempang wisuda

Bahan : ${bahan}
Model : ${model}
Bordir : ${bordir}
Motif : ${motif.replace("Motif_","")}`

let nomor="6281372490831"

let url=`https://wa.me/${nomor}?text=${encodeURIComponent(pesan)}`

window.open(url,"_blank")

}

loadModels()
loadMotifs()

setWarna("Navy")
setModel("1")
setMotif("Motif_Kait")

</script>

</body>
</html>
```
