<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Custom Selempang Wisuda</title>
<style>
body{
    font-family:Arial,sans-serif;
    background:#f2f2f2;
    margin:0;
    padding:0;
}
.container{
    max-width:1200px;
    margin:auto;
    padding:30px;
    display:flex;
    flex-wrap:wrap;
    gap:40px;
}
.preview{
    flex:1;
    min-width:300px;
    position:relative;
    aspect-ratio:1/1;
    border:1px solid #ccc;
    background:#fff;
}
.preview img{
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:100%;
    object-fit:contain;
}
#warna{ z-index:1; }
#model{ z-index:2; }
#motif{ z-index:3; }

/* CONTROLS */
.controls{
    flex:1;
    min-width:280px;
}
.group{
    margin-bottom:30px;
}
.group h3{
    margin-bottom:10px;
}
.options{
    display:flex;
    flex-wrap:wrap;
    gap:10px;
}
button{
    padding:8px 12px;
    border:none;
    background:#ddd;
    cursor:pointer;
    border-radius:5px;
    transition:0.2s;
}
button:hover{
    background:#bbb;
}
button:disabled{
    background:#f0f0f0;
    cursor:not-allowed;
}

/* MOTIF GRID */
.grid{
    display:flex;
    flex-direction:column;
    gap:10px;
}
.thumb{
    display:flex;
    align-items:center;
    gap:10px;
    cursor:pointer;
}
.thumb img{
    width:50px;
    height:50px;
    border-radius:6px;
    border:2px solid #ddd;
    object-fit:cover;
    transition:0.2s;
}
.thumb span{
    font-size:14px;
    white-space:nowrap;
}
.thumb.active img{
    border-color:#444;
}
.tab{
    display:flex;
    gap:10px;
    margin-bottom:10px;
}
.tab button{
    flex:1;
}
@media(max-width:768px){
    .container{
        flex-direction:column;
        gap:20px;
    }
}
</style>
</head>
<body>

<div class="container">

    <!-- PREVIEW -->
    <div class="preview">
        <img id="warna" src="">
        <img id="model" src="">
        <img id="motif" src="">
    </div>

    <!-- CONTROLS -->
    <div class="controls">

        <!-- BAHAN -->
        <div class="group">
            <h3>Pilih Bahan</h3>
            <div class="options">
                <button id="btnHitam" onclick="setWarna('Hitam')">Hitam</button>
                <button id="btnMaroon" onclick="setWarna('Maroon')">Maroon</button>
                <button id="btnNavy" onclick="setWarna('Navy')">Navy</button>
            </div>
        </div>

        <!-- WARNA BORDIR -->
        <div class="group">
            <h3>Warna Bordir</h3>
            <div class="tab">
                <button id="btnGold" onclick="setBordir('Gold')" disabled>Gold</button>
                <button id="btnSilver" onclick="setBordir('Silver')" disabled>Silver</button>
            </div>
        </div>

        <!-- MODEL -->
        <div class="group">
            <h3>Pilih Model</h3>
            <div class="options" id="modelOptions"></div>
        </div>

        <!-- MOTIF -->
        <div class="group">
            <h3>Pilih Motif</h3>
            <div class="grid" id="motifList"></div>
        </div>

    </div>

</div>

<script>
// STATE
let model = 1;
let bordir = "";
let motif = "Motif_Kait";
let bahanSelected = false;
let bordirSelected = false;

// DATA
const models = [1,2,3,4,5,6,7,8,9];
const motifs = [
    "Motif_Daun",
    "Motif_Flora",
    "Motif_Kait",
    "Motif_Klasik",
    "Motif_Polos",
    "Motif_Serat",
    "Motif_Simpul"
];

// LOAD MODEL BUTTONS
function loadModels(){
    const container = document.getElementById("modelOptions");
    container.innerHTML = "";
    models.forEach(m=>{
        let btn = document.createElement("button");
        btn.textContent = m;
        btn.onclick = ()=> setModel(m);
        btn.disabled = true; // disable sampai bordir dipilih
        container.appendChild(btn);
    });
}

// LOAD MOTIF THUMBNAIL
function loadMotifs(){
    const container = document.getElementById("motifList");
    container.innerHTML = "";
    motifs.forEach(m=>{
        let name = m.replace("Motif_","");
        const div = document.createElement("div");
        div.className = "thumb";
        div.onclick = ()=> setMotif(m);
        div.innerHTML = `<img loading="lazy" src="images/Thumb/${m}_thumb.png"><span>${name}</span>`;
        div.querySelector("img").parentElement.querySelector("span").style.userSelect = "none";
        container.appendChild(div);
    });
}

// SET FUNCTIONS
function setWarna(w){
    document.getElementById("warna").src = "images/Bahan/Bahan_" + w + ".png";
    bahanSelected = true;
    enableBordir();
}

function enableBordir(){
    if(bahanSelected){
        document.getElementById("btnGold").disabled = false;
        document.getElementById("btnSilver").disabled = false;
    }
}

function setBordir(b){
    bordir = b;
    bordirSelected = true;
    updateModel();
    updateMotif();
    enableModel();
}

function enableModel(){
    if(bordirSelected){
        document.querySelectorAll("#modelOptions button").forEach(btn=> btn.disabled = false);
    }
}

function setModel(n){
    model = n;
    updateModel();
    enableMotif();
}

function enableMotif(){
    document.querySelectorAll(".thumb").forEach(t=> t.style.pointerEvents = "auto");
}

function setMotif(m){
    if(!bordirSelected) return; // pastikan sudah pilih bordir
    motif = m;
    updateMotif();
    document.querySelectorAll(".thumb").forEach(t=>t.classList.remove("active"));
    const thumb = document.querySelector(`.thumb img[src*='${m}_thumb.png']`);
    if(thumb) thumb.parentElement.classList.add("active");
}

// UPDATE FUNCTIONS
function updateModel(){
    document.getElementById("model").src = "images/Model/Model_" + model + "_" + bordir + ".png";
}
function updateMotif(){
    if(motif === "Motif_Polos"){
        document.getElementById("motif").src = "images/Motif/Motif_Polos.png";
    } else {
        document.getElementById("motif").src = "images/Motif/" + motif + "_" + bordir + ".png";
    }
}

// INIT
loadModels();
loadMotifs();
// disable semua motif sampai user pilih model
document.querySelectorAll(".thumb").forEach(t=> t.style.pointerEvents = "none");

// set default warna bahan
setWarna("Navy");
</script>

</body>
</html>
