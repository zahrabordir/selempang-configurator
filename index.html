<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Custom Selempang Wisuda</title>

<style>

body{
font-family:Arial;
background:#f4f4f4;
margin:0;
}

.container{
max-width:1200px;
margin:auto;
padding:30px;
display:flex;
flex-wrap:wrap;
gap:40px;
}

.preview{
flex:1;
min-width:350px;
position:relative;
}

.preview img{
width:100%;
}

.layer{
position:absolute;
top:0;
left:0;
}

.nama{
position:absolute;
top:120px;
left:56%;
width:420px;

color:white;
font-size:32px;
font-weight:bold;

transform:rotate(90deg);
transform-origin:left top;

text-align:center;
letter-spacing:2px;

text-shadow:
1px 1px 0 rgba(0,0,0,0.3),
0 0 4px rgba(255,255,255,0.3);
}

.controls{
flex:1;
min-width:320px;
}

.group{
margin-bottom:30px;
}

.group h3{
margin-bottom:10px;
}

.options{
display:flex;
flex-wrap:wrap;
gap:10px;
}

.options button{
padding:10px 14px;
border:none;
background:#ddd;
cursor:pointer;
border-radius:4px;
}

.options button:hover{
background:#bbb;
}

input{
width:100%;
padding:10px;
font-size:16px;
}

</style>
</head>

<body>

<div class="container">

<!-- PREVIEW -->
<div class="preview">

<img id="model" src="images/Model Gold 1.png">

<img id="warna" class="layer" src="images/Bahan Navy.png">

<img id="motif" class="layer" src="images/Motif Daun.png">

<div id="namaPreview" class="nama">
Nama Anda
</div>

</div>


<!-- CONTROL -->
<div class="controls">

<!-- MODEL -->
<div class="group">
<h3>Pilih Model</h3>

<div class="options">

<button onclick="changeModel('Model Gold 1.png')">1</button>
<button onclick="changeModel('Model Gold 2.png')">2</button>
<button onclick="changeModel('Model Gold 3.png')">3</button>
<button onclick="changeModel('Model Gold 4.png')">4</button>
<button onclick="changeModel('Model Gold 5.png')">5</button>
<button onclick="changeModel('Model Gold 6.png')">6</button>
<button onclick="changeModel('Model Gold 7.png')">7</button>
<button onclick="changeModel('Model Gold 8.png')">8</button>
<button onclick="changeModel('Model Gold 9.png')">9</button>

</div>
</div>

<!-- WARNA -->
<div class="group">
<h3>Warna Bahan</h3>

<div class="options">

<button onclick="changeColor('Bahan Hitam.png')">Hitam</button>
<button onclick="changeColor('Bahan Maroon.png')">Maroon</button>
<button onclick="changeColor('Bahan Navy.png')">Navy</button>

</div>
</div>

<!-- MOTIF -->
<div class="group">
<h3>Pilih Motif</h3>

<div class="options">

<button onclick="changeMotif('Motif Daun.png')">Daun</button>
<button onclick="changeMotif('Motif Flora.png')">Flora</button>
<button onclick="changeMotif('Motif Kait.png')">Kait</button>
<button onclick="changeMotif('Motif Klasik.png')">Klasik</button>

</div>
</div>

<!-- NAMA -->
<div class="group">

<h3>Nama di Selempang</h3>

<input 
type="text"
placeholder="Tulis nama..."
onkeyup="updateNama(this.value)">

</div>

</div>

</div>

<script>

function changeModel(img){

document.getElementById("model").src="images/"+img;

}

function changeColor(img){

document.getElementById("warna").src="images/"+img;

}

function changeMotif(img){

document.getElementById("motif").src="images/"+img;

}

function updateNama(nama){

const el=document.getElementById("namaPreview");

el.innerText=nama;

let size=32;

if(nama.length>15) size=26;
if(nama.length>20) size=22;
if(nama.length>25) size=18;

el.style.fontSize=size+"px";

}

</script>

</body>
</html>
