<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Custom Selempang Wisuda</title>

<style>
*{box-sizing:border-box;}

body{
font-family:Arial;
margin:0;
background:#f2f2f2;
}

.container{
max-width:1200px;
margin:auto;
padding:30px;
display:flex;
flex-wrap:wrap;
gap:30px;
}

.preview{
position:relative;
aspect-ratio:1/1;
background:#fff;
border:1px solid #ccc;
}

.preview img{
position:absolute;
top:0;left:0;
width:100%;height:100%;
object-fit:contain;
}

.controls,.textInput{
flex:1;
min-width:280px;
}

button{
padding:8px 12px;
border:none;
background:#ddd;
cursor:pointer;
margin:3px;
border-radius:5px;
}

#submitBtn{
background:#4CAF50;
color:#fff;
width:100%;
margin-top:10px;
padding:12px;
}

#overlay{
display:none;
position:fixed;
top:0;left:0;
width:100%;
height:100%;
background:#000;
justify-content:center;
align-items:center;
flex-direction:column;
}

#fullCanvas{
background:#fff;
max-width:90vw;
max-height:90vh;
}
</style>
</head>

<body>

<div class="container">

<!-- PREVIEW -->
<div class="preview">
<img id="warna">
<img id="model">
<img id="motif">
</div>

<!-- CONTROL -->
<div class="controls">
<h3>Bahan</h3>
<button onclick="setWarna('Hitam')">Hitam</button>
<button onclick="setWarna('Maroon')">Maroon</button>
<button onclick="setWarna('Navy')">Navy</button>

<h3>Warna Bordir</h3>
<button onclick="setBordir('Gold')">Gold</button>
<button onclick="setBordir('Silver')">Silver</button>

<h3>Model</h3>
<div id="modelOptions"></div>

<h3>Motif</h3>
<div id="motifList"></div>
</div>

<!-- INPUT -->
<div class="textInput">
<h3>Data (tidak tampil di hasil)</h3>
<input id="namaGelar" placeholder="Nama">
<input id="kampus" placeholder="Kampus">
<input id="jurusan" placeholder="Jurusan">
<input id="classof" placeholder="Class">

<button id="submitBtn" onclick="submitSelection()">Lihat Hasil</button>
</div>

</div>

<!-- OVERLAY -->
<div id="overlay">
<canvas id="fullCanvas"></canvas>
<button onclick="closeOverlay()">Close</button>
<button onclick="downloadJPG()">Download</button>
</div>

<script>

let model="1"
let bordir="Gold"
let motif="Motif_Kait"

const models=["1","2","3","4","5","6","7","8","9","PPG_1","PPG_2","PPG_3"]

const motifs=[
"Motif_Daun",
"Motif_Flora",
"Motif_Kait",
"Motif_Klasik",
"Motif_Polos",
"Motif_Serat",
"Motif_Simpul"
]

function loadModels(){
let c=document.getElementById("modelOptions")
models.forEach(m=>{
let b=document.createElement("button")
b.innerText=m
b.onclick=()=>setModel(m)
c.appendChild(b)
})
}

function loadMotifs(){
let c=document.getElementById("motifList")
motifs.forEach(m=>{
let b=document.createElement("button")
b.innerText=m.replace("Motif_","")
b.onclick=()=>setMotif(m)
c.appendChild(b)
})
}

function setWarna(w){
document.getElementById("warna").src="images/Bahan/Bahan_"+w+".png"
}

function setBordir(b){
bordir=b
setModel(model)
setMotif(motif)
}

function setModel(n){
model=n
let file = n.startsWith("PPG_") ? n+"_"+bordir+".png" : "Model_"+n+"_"+bordir+".png"
document.getElementById("model").src="images/Model/"+file
}

function setMotif(m){
motif=m
if(m==="Motif_Polos"){
document.getElementById("motif").src="images/Motif/Motif_Polos.png"
}else{
document.getElementById("motif").src="images/Motif/"+m+"_"+bordir+".png"
}
}

function loadImage(src){
return new Promise(res=>{
let img=new Image()
img.onload=()=>res(img)
img.src=src
})
}

async function submitSelection(){

let warnaEl=document.getElementById("warna")
let modelEl=document.getElementById("model")
let motifEl=document.getElementById("motif")

if(!warnaEl.src || !modelEl.src || !motifEl.src){
alert("Lengkapi dulu")
return
}

let canvas=document.getElementById("fullCanvas")
let ctx=canvas.getContext("2d")

document.getElementById("overlay").style.display="flex"

let imgWarna=await loadImage(warnaEl.src)
let imgModel=await loadImage(modelEl.src)
let imgMotif=await loadImage(motifEl.src)

let scale=2
canvas.width=imgModel.width*scale
canvas.height=imgModel.height*scale

ctx.fillStyle="#fff"
ctx.fillRect(0,0,canvas.width,canvas.height)

ctx.drawImage(imgWarna,0,0,canvas.width,canvas.height)
ctx.drawImage(imgModel,0,0,canvas.width,canvas.height)
ctx.drawImage(imgMotif,0,0,canvas.width,canvas.height)

}

function closeOverlay(){
overlay.style.display="none"
}

function downloadJPG(){
let a=document.createElement("a")
a.href=fullCanvas.toDataURL("image/jpeg",0.95)
a.download="hasil.jpg"
a.click()
}

/* INIT FIX */
document.addEventListener("DOMContentLoaded",function(){

loadModels()
loadMotifs()

setWarna("Navy")
setBordir("Gold")
setModel("1")
setMotif("Motif_Kait")

})

</script>

</body>
</html>
