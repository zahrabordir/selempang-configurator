<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Custom Selempang Wisuda</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f2f2f2;
}

.container{
max-width:1200px;
margin:auto;
padding:30px;
display:flex;
flex-wrap:wrap;
gap:40px;
}

.preview{
flex:1;
min-width:300px;
position:relative;
aspect-ratio:1/1;
border:1px solid #ccc;
background:#fff;
}

.preview img{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
object-fit:contain;
}

#warna{z-index:1}
#model{z-index:2}
#motif{z-index:3}

#textPreview{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
pointer-events:none;
font-weight:bold;
z-index:4;
}

#textPreview span{
color:#FFD700;
text-shadow:1px 1px 2px #000;
}

.controls{
flex:1;
min-width:280px;
}

.group{
margin-bottom:25px;
}

.options{
display:flex;
flex-wrap:wrap;
gap:10px;
}

button{
padding:8px 12px;
border:none;
background:#ddd;
cursor:pointer;
border-radius:5px;
}

button.active{
background:#333;
color:#fff;
}

button:hover{
background:#bbb;
}

.grid{
display:flex;
flex-wrap:wrap;
gap:10px;
}

.thumb{
display:flex;
flex-direction:column;
align-items:center;
cursor:pointer;
font-size:12px;
}

.thumb img{
width:60px;
height:60px;
border:2px solid #ddd;
border-radius:6px;
object-fit:cover;
}

.thumb.active img{
border-color:#000;
}

input{
width:100%;
padding:8px;
margin-bottom:8px;
}

#submitBtn{
margin-top:10px;
background:#4CAF50;
color:#fff;
}

#overlay{
display:none;
position:fixed;
top:0;
left:0;
width:100vw;
height:100vh;
background:rgba(0,0,0,0.95);
z-index:9999;
justify-content:center;
align-items:center;
flex-direction:column;
}

#fullCanvas{
max-width:90vw;
max-height:90vh;
background:#fff;
cursor:grab;
}

#closeOverlay{
position:fixed;
top:20px;
right:20px;
background:#fff;
padding:10px 15px;
border-radius:6px;
cursor:pointer;
}

.actionButtons{
position:fixed;
bottom:30px;
display:flex;
gap:10px;
}

.actionButtons button{
background:#fff;
}

</style>
</head>

<body>

<div class="container">

<div class="preview">

<img id="warna">
<img id="model">
<img id="motif">

<div id="textPreview"></div>

</div>

<div class="controls">

<div class="group">
<h3>Bahan</h3>
<div class="options">
<button onclick="setWarna('Hitam',this)">Hitam</button>
<button onclick="setWarna('Maroon',this)">Maroon</button>
<button onclick="setWarna('Navy',this)">Navy</button>
</div>
</div>

<div class="group">
<h3>Warna Bordir</h3>
<div class="options">
<button onclick="setBordir('Gold',this)">Gold</button>
<button onclick="setBordir('Silver',this)">Silver</button>
</div>
</div>

<div class="group">
<h3>Model</h3>
<div class="options" id="modelOptions"></div>
</div>

<div class="group">
<h3>Motif</h3>
<div class="grid" id="motifList"></div>
</div>

<div class="group">

<h3>Data Tulisan</h3>

<input id="namaKampus" placeholder="Nama Universitas" oninput="updateText()">

<input id="jurusan" placeholder="Bachelor of" oninput="updateText()">

<input id="tahun" placeholder="Class of" oninput="updateText()">

<input id="namaGelar" placeholder="Nama & Gelar" oninput="updateText()">

</div>

<button id="submitBtn" onclick="submitSelection()">Lihat Hasil</button>

</div>
</div>

<div id="overlay">

<button id="closeOverlay" onclick="closeOverlay()">Close</button>

<canvas id="fullCanvas"></canvas>

<div class="actionButtons">
<button onclick="downloadJPG()">Unduh Gambar</button>
<button onclick="sendWhatsApp()">Kirim WhatsApp</button>
</div>

</div>

<script>

let model="1"
let bordir="Gold"
let motif="Motif_Kait"

const models=["1","2","3","4","5","6","7","8","9","PPG_1","PPG_2","PPG_3"]

const motifs=[
"Motif_Daun",
"Motif_Flora",
"Motif_Kait",
"Motif_Klasik",
"Motif_Polos",
"Motif_Serat",
"Motif_Simpul"
]

function setActive(parent,el){
[...parent.children].forEach(b=>b.classList.remove("active"))
if(el) el.classList.add("active")
}

function loadModels(){

const container=document.getElementById("modelOptions")

models.forEach(m=>{

let btn=document.createElement("button")
btn.innerText=m

btn.onclick=()=>{
setModel(m)
setActive(container,btn)
}

container.appendChild(btn)

})

}

function loadMotifs(){

const container=document.getElementById("motifList")

motifs.forEach(m=>{

let name=m.replace("Motif_","")

let div=document.createElement("div")
div.className="thumb"

div.onclick=()=>{
setMotif(m)
[...container.children].forEach(t=>t.classList.remove("active"))
div.classList.add("active")
}

div.innerHTML=
`<img src="images/Thumb/${m}_thumb.png">
<span>${name}</span>`

container.appendChild(div)

})

}

function setWarna(w,btn){

document.getElementById("warna").src="images/Bahan/Bahan_"+w+".png"
setActive(btn.parentElement,btn)

}

function setBordir(b,btn){

bordir=b
setModel(model)
setMotif(motif)

setActive(btn.parentElement,btn)

}

function setModel(n){

model=n

let file=n.startsWith("PPG_")
? n+"_"+bordir+".png"
: "Model_"+n+"_"+bordir+".png"

document.getElementById("model").src="images/Model/"+file

}

function setMotif(m){

motif=m

if(m==="Motif_Polos"){
document.getElementById("motif").src="images/Motif/Motif_Polos.png"
}else{
document.getElementById("motif").src="images/Motif/"+m+"_"+bordir+".png"
}

}

function updateText(){

let kampus=document.getElementById("namaKampus").value
let jurusan=document.getElementById("jurusan").value
let tahun=document.getElementById("tahun").value
let nama=document.getElementById("namaGelar").value

let box=document.getElementById("textPreview")

box.innerHTML=`
<span style="font-size:18px">${kampus}</span>
<span style="font-size:16px">${jurusan}</span>
<span style="font-size:14px">${tahun}</span>
<span style="font-size:20px">${nama}</span>
`

}

/* CANVAS PREVIEW */

function submitSelection(){

const overlay=document.getElementById("overlay")
const canvas=document.getElementById("fullCanvas")
const ctx=canvas.getContext("2d")

overlay.style.display="flex"

const imgWarna=new Image()
const imgModel=new Image()
const imgMotif=new Image()

imgWarna.src=document.getElementById("warna").src
imgModel.src=document.getElementById("model").src
imgMotif.src=document.getElementById("motif").src

let loaded=0

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height)

ctx.drawImage(imgWarna,0,0,canvas.width,canvas.height)
ctx.drawImage(imgModel,0,0,canvas.width,canvas.height)
ctx.drawImage(imgMotif,0,0,canvas.width,canvas.height)

}

[imgWarna,imgModel,imgMotif].forEach(img=>{

img.onload=()=>{

loaded++

if(loaded===3){

canvas.width=imgModel.width*2
canvas.height=imgModel.height*2

draw()

}

}

})

}

function closeOverlay(){
document.getElementById("overlay").style.display="none"
}

function downloadJPG(){

const canvas=document.getElementById("fullCanvas")

const link=document.createElement("a")

link.download="selempang-custom.jpg"

link.href=canvas.toDataURL("image/jpeg",0.95)

link.click()

}

function sendWhatsApp(){

let namaKampus=document.getElementById("namaKampus").value
let jurusan=document.getElementById("jurusan").value
let tahun=document.getElementById("tahun").value
let namaGelar=document.getElementById("namaGelar").value

if(!namaKampus || !namaGelar){

alert("Silakan isi data terlebih dahulu")
return

}

let bahan=document.getElementById("warna").src.split("Bahan_")[1].replace(".png","")

let motifText = motif.replace("Motif_","")

let pesan =
`Halo Kak produk ready, langsung CO dan isi format dibawah ya :

FORMAT ORDER :

Motif Batik : ${motifText}
Nomor Model : ${model}
Warna Kain : ${bahan}
Warna Tulisan : ${bordir}
Warna Logo : ${bordir}

Posisi A. : (logo kampus)
Posisi B. : ${namaKampus}
Posisi C. : ${jurusan}
Posisi D. : ${tahun}
Posisi E. : ${namaGelar}`

let nomor="6281372490831"

let url=`https://wa.me/${nomor}?text=${encodeURIComponent(pesan)}`

window.open(url,"_blank")

}

loadModels()
loadMotifs()

setWarna("Navy")
setModel("1")
setMotif("Motif_Kait")

</script>

</body>
</html>
