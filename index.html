<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Preview Selempang Wisuda</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
font-family:Arial;
margin:0;
background:#f5f5f5;
}

.container{
max-width:1100px;
margin:auto;
padding:20px;
background:white;
display:flex;
gap:30px;
flex-wrap:wrap;
}

.left{
flex:1;
min-width:320px;
}

.right{
flex:1;
min-width:320px;
text-align:center;
}

.preview{
width:100%;
max-width:400px;
}

.preview img{
width:100%;
}

.section{
margin-bottom:25px;
}

.section h3{
margin-bottom:10px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(90px,1fr));
gap:10px;
}

.thumb{
cursor:pointer;
text-align:center;
border:2px solid transparent;
border-radius:8px;
padding:5px;
background:#fafafa;
}

.thumb img{
width:100%;
border-radius:6px;
}

.thumb span{
display:block;
font-size:12px;
margin-top:4px;
}

.thumb.active{
border-color:#d4af37;
background:#fff8dc;
}

.tabs{
display:flex;
gap:10px;
margin-bottom:15px;
}

.tab{
padding:8px 16px;
background:#eee;
cursor:pointer;
border-radius:6px;
}

.tab.active{
background:#d4af37;
color:white;
}

</style>
</head>

<body>

<div class="container">

<!-- LEFT -->
<div class="left">

<div class="section">
<h3>Pilih Model</h3>

<select id="modelSelect">

<option value="model_1">Model 1</option>
<option value="model_2">Model 2</option>
<option value="model_3">Model 3</option>

</select>

</div>


<div class="section">

<h3>Pilih Motif</h3>

<div class="tabs">
<div class="tab active" onclick="switchTab('gold')">Gold</div>
<div class="tab" onclick="switchTab('silver')">Silver</div>
</div>

<div id="gold" class="grid motifGrid">

<div class="thumb" data-motif="Motif_Kait">
<img src="images/motif/Motif_Kait_thumb.png">
<span>Kait</span>
</div>

<div class="thumb" data-motif="Motif_Bunga">
<img src="images/motif/Motif_Bunga_thumb.png">
<span>Bunga</span>
</div>

<div class="thumb" data-motif="Motif_Mahkota">
<img src="images/motif/Motif_Mahkota_thumb.png">
<span>Mahkota</span>
</div>

</div>


<div id="silver" class="grid motifGrid" style="display:none">

<div class="thumb" data-motif="Motif_Kait">
<img src="images/motif/Motif_Kait_thumb.png">
<span>Kait</span>
</div>

<div class="thumb" data-motif="Motif_Bunga">
<img src="images/motif/Motif_Bunga_thumb.png">
<span>Bunga</span>
</div>

<div class="thumb" data-motif="Motif_Mahkota">
<img src="images/motif/Motif_Mahkota_thumb.png">
<span>Mahkota</span>
</div>

</div>

</div>

</div>


<!-- RIGHT -->
<div class="right">

<h3>Preview</h3>

<div class="preview">
<img id="previewImage" src="images/model/model_1.png">
</div>

</div>

</div>


<script>

let selectedMotif="Motif_Kait"
let selectedModel="model_1"


document.querySelectorAll(".thumb").forEach(el=>{

el.onclick=function(){

document.querySelectorAll(".thumb").forEach(t=>t.classList.remove("active"))

this.classList.add("active")

selectedMotif=this.dataset.motif

updatePreview()

}

})


document.getElementById("modelSelect").onchange=function(){

selectedModel=this.value

updatePreview()

}



function updatePreview(){

let img="images/model/"+selectedModel+".png"

document.getElementById("previewImage").src=img

}



function switchTab(tab){

document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"))

event.target.classList.add("active")

document.getElementById("gold").style.display="none"
document.getElementById("silver").style.display="none"

document.getElementById(tab).style.display="grid"

}

</script>

</body>
</html>
