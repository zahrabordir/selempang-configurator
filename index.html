<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Custom Selempang Wisuda</title>

<style>
.bordirBtn{
font-weight:bold;
border-radius:6px;
}

/* GOLD */
.gold{
background:linear-gradient(145deg,#FFD700,#C9A000);
color:#000;
}

/* SILVER */
.silver{
background:linear-gradient(145deg,#E0E0E0,#9E9E9E);
color:#000;
}

/* HOVER EFFECT */
.gold:hover{
background:linear-gradient(145deg,#ffe44d,#b89600);
}

.silver:hover{
background:linear-gradient(145deg,#f5f5f5,#7a7a7a);
}
 
/* WARNA TOMBOL */
 .warnaBtn{
color:#fff;
font-weight:bold;
}

/* WARNA SESUAI NAMA */
.hitam{
background:#000;
}

.maroon{
background:#800000;
}

.navy{
background:#001f3f;
}

/* HOVER BIAR LEBIH HIDUP */
.hitam:hover{
background:#222;
}

.maroon:hover{
background:#a00000;
}

.navy:hover{
background:#003366;
} 
  
/* GLOBAL */
*{box-sizing:border-box;}

body{
font-family:Arial;
margin:0;
background:#f2f2f2;
}

/* LAYOUT 3 KOLOM */
.container{
max-width:1200px;
margin:auto;
padding:30px;
display:flex;
flex-wrap:wrap;
gap:30px;
align-items:flex-start;
}

/* PREVIEW */
.previewBox{
flex:1;
min-width:320px;
}

.preview{
position:relative;
aspect-ratio:1/1;
border:1px solid #ccc;
background:#fff;
}

.preview img{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
object-fit:contain;
}

#warna{z-index:1}
#model{z-index:2}
#motif{z-index:3}

/* CONTROL */
.controls{
flex:1;
min-width:280px;
}

.group{
margin-bottom:25px;
}

.options{
display:flex;
flex-wrap:wrap;
gap:10px;
}

button{
padding:8px 12px;
border:none;
background:#ddd;
cursor:pointer;
border-radius:5px;
}

button:hover{
background:#bbb;
}

/* INPUT KANAN */
.textInput{
flex:1;
min-width:280px;
background:#fff;
padding:15px;
border:1px solid #ccc;
border-radius:6px;
height:fit-content;
}

.textInput input{
width:100%;
padding:10px;
margin-bottom:8px;
border:1px solid #ccc;
border-radius:5px;
}

/* TOMBOL LIHAT HASIL */
#submitBtn{
margin-top:15px;
width:100%;
background:#4CAF50;
color:#fff;
padding:12px;
font-size:16px;
border-radius:6px;
cursor:pointer;
}

#submitBtn:hover{
background:#43a047;
}

/* GRID MOTIF */
.grid{
display:flex;
flex-wrap:wrap;
gap:10px;
}

.thumb{
display:flex;
flex-direction:column;
align-items:center;
cursor:pointer;
}

.thumb img{
width:60px;
height:60px;
border:2px solid #ddd;
border-radius:6px;
object-fit:cover;
}

/* OVERLAY */
#overlay{
display:none;
position:fixed;
top:0;
left:0;
width:100vw;
height:100vh;
background:rgba(0,0,0,0.95);
z-index:9999;
justify-content:center;
align-items:center;
flex-direction:column;
}

#fullCanvas{
max-width:90vw;
max-height:90vh;
background:#fff;
}

#closeOverlay{
position:fixed;
top:20px;
right:20px;
background:#fff;
padding:10px 15px;
border-radius:6px;
cursor:pointer;
z-index:10000;
}

.actionButtons{
position:fixed;
bottom:30px;
display:flex;
gap:10px;
}

.actionButtons button{
background:#fff;
}

</style>
</head>

<body>

<div class="container">

<!-- KIRI: PREVIEW -->
<div class="previewBox">
<div class="preview">
<img id="warna">
<img id="model">
<img id="motif">
</div>
</div>

<!-- TENGAH: CONTROL -->
<div class="controls">

<div class="group">
<h3>Bahan</h3>
<div class="options">
<button class="warnaBtn hitam" onclick="setWarna('Hitam')">Hitam</button>
<button class="warnaBtn maroon" onclick="setWarna('Maroon')">Maroon</button>
<button class="warnaBtn navy" onclick="setWarna('Navy')">Navy</button>
</div>
</div>

<div class="group">
<h3>Warna Bordir</h3>
<div class="options">
<button class="bordirBtn gold" onclick="setBordir('Gold')">Gold</button>
<button class="bordirBtn silver" onclick="setBordir('Silver')">Silver</button>
</div>
</div>

<div class="group">
<h3>Model</h3>
<div class="options" id="modelOptions"></div>
</div>

<div class="group">
<h3>Motif</h3>
<div class="grid" id="motifList"></div>
</div>

</div>

<!-- KANAN: INPUT -->
<div class="textInput">

<h3>Data Tulisan</h3>

<input id="namaGelar" placeholder="Nama & Gelar">
<input id="kampus" placeholder="Nama Universitas">
<input id="jurusan" placeholder="Jurusan">
<input id="classof" placeholder="Class Of">

<button id="submitBtn" onclick="submitSelection()">Lihat Hasil</button>

</div>

</div>

<!-- OVERLAY -->
<div id="overlay">

<button id="closeOverlay" onclick="closeOverlay()">Close</button>

<canvas id="fullCanvas"></canvas>

<div class="actionButtons">
<button onclick="downloadJPG()">Unduh Gambar</button>
<button onclick="sendWhatsApp()">Kirim WhatsApp</button>
</div>

</div>

<script>

let model="1"
let bordir="Gold"
let motif="Motif_Kait"

const models=["1","2","3","4","5","6","7","8","9","PPG_1","PPG_2","PPG_3"]

const motifs=[
"Motif_Polos",
"Motif_Daun",
"Motif_Flora",
"Motif_Kait",
"Motif_Klasik",
"Motif_Serat",
"Motif_Simpul"
]

function loadModels(){
const container=document.getElementById("modelOptions")
models.forEach(m=>{
let btn=document.createElement("button")
btn.innerText=m
btn.onclick=()=>setModel(m)
container.appendChild(btn)
})
}

function loadMotifs(){
const container=document.getElementById("motifList")
motifs.forEach(m=>{
let name=m.replace("Motif_","")
let div=document.createElement("div")
div.className="thumb"
div.onclick=()=>setMotif(m)
div.innerHTML=`<img src="images/Thumb/${m}_thumb.png"><span>${name}</span>`
container.appendChild(div)
})
}

function setWarna(w){
document.getElementById("warna").src="images/Bahan/Bahan_"+w+".png"
}

function setBordir(b){
bordir=b
setModel(model)
setMotif(motif)
}

function setModel(n){
model=n
let file=n.startsWith("PPG_") ? n+"_"+bordir+".png" : "Model_"+n+"_"+bordir+".png"
document.getElementById("model").src="images/Model/"+file
}

function setMotif(m){
motif=m
if(m==="Motif_Polos"){
document.getElementById("motif").src="images/Motif/Motif_Polos.png"
}else{
document.getElementById("motif").src="images/Motif/"+m+"_"+bordir+".png"
}
}

/* LOAD IMAGE AMAN */
function loadImage(src){
return new Promise(resolve=>{
const img=new Image()
img.onload=()=>resolve(img)
img.src=src
})
}

/* PREVIEW */
async function submitSelection(){

const overlay=document.getElementById("overlay")
const canvas=document.getElementById("fullCanvas")
const ctx=canvas.getContext("2d")

overlay.style.display="flex"

const imgWarna=await loadImage(document.getElementById("warna").src)
const imgModel=await loadImage(document.getElementById("model").src)
const imgMotif=await loadImage(document.getElementById("motif").src)

canvas.width=imgModel.width*2
canvas.height=imgModel.height*2

ctx.drawImage(imgWarna,0,0,canvas.width,canvas.height)
ctx.drawImage(imgModel,0,0,canvas.width,canvas.height)
ctx.drawImage(imgMotif,0,0,canvas.width,canvas.height)

}

function closeOverlay(){
document.getElementById("overlay").style.display="none"
}

function downloadJPG(){
const canvas=document.getElementById("fullCanvas")
const link=document.createElement("a")
link.download="selempang-custom.jpg"
link.href=canvas.toDataURL("image/jpeg",0.95)
link.click()
}

/* WHATSAPP */
function sendWhatsApp(){

let kampus=document.getElementById("kampus").value
let jurusan=document.getElementById("jurusan").value
let classof=document.getElementById("classof").value
let namaGelar=document.getElementById("namaGelar").value

if(!namaGelar){
alert("Isi Format Order dulu")
return
}

let warnaSrc=document.getElementById("warna").src
if(!warnaSrc){
alert("Pilih warna kain dulu")
return
}

let bahan=warnaSrc.split("Bahan_")[1].replace(".png","")

let pesan=`Halo Kak, saya mau pesan selempang wisuda:

Motif : ${motif.replace("Motif_","")}
Model : ${model}
Warna Kain : ${bahan}
Warna Tulisan : ${bordir}

Kampus : ${kampus}
Jurusan : ${jurusan}
Class : ${classof}
Nama : ${namaGelar}`

let nomor="6281372490831"
let url=`https://wa.me/${nomor}?text=${encodeURIComponent(pesan)}`

window.open(url,"_blank")

}

loadModels()
loadMotifs()

setWarna("Navy")
setModel("1")
setMotif("Motif_Kait")

</script>

</body>
</html>
